<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="/favicon-light.png" media="(prefers-color-scheme: light)">
<link rel="icon" href="/favicon-dark.png" media="(prefers-color-scheme: dark)">

<title>Null_X Loader</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@200..800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<style>
.cloak-wrapper{
position:relative;
display:inline-block;
}

.cloak-menu{
display:none;
position:absolute;
right:0;
top:40px;
background:#111;
border:1px solid #333;
border-radius:6px;
padding:5px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
z-index:999;
}

.cloak-menu button{
display:block;
width:100%;
padding:8px 12px;
text-align:left;
background:none;
border:none;
color:white;
cursor:pointer;
}

.cloak-menu button:hover{
background:#222;
}
body{
margin:0;
font-family:"Oxanium",sans-serif;
background:#000;
color:#fff;
}

/* ---------------- LANDING PAGE ---------------- */

#landing{
display:flex;
flex-direction:column;
min-height:100vh;
}

header{
text-align:center;
padding:60px 20px 30px;
}

header h1{
font-size:3.2rem;
letter-spacing:2px;
margin:0;
}

header h2{
font-weight:300;
margin-top:10px;
opacity:0.8;
}

hr{
width:85%;
border:1px solid #fff;
opacity:0.4;
}

main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

.content-box{
max-width:700px;
background:#111;
border:1px solid #333;
padding:40px;
border-radius:10px;
text-align:center;
box-shadow:0 0 25px rgba(255,255,255,0.05);
}

.launch{
margin-top:30px;
padding:12px 30px;
background:#fff;
color:#000;
border:none;
border-radius:5px;
cursor:pointer;
font-family:"Oxanium";
font-size:1rem;
}

footer{
text-align:center;
font-size:0.8rem;
padding:15px;
opacity:0.5;
}

/* ---------------- BROWSER UI ---------------- */

#browser{
display:none;
height:100vh;
flex-direction:column;
}

.browser-bar{
display:flex;
align-items:center;
padding:10px;
background:#111;
border-bottom:1px solid #333;
}

.nav-buttons button,
.action-buttons button{
background:none;
border:none;
color:white;
cursor:pointer;
margin:0 4px;
}

#url{
flex:1;
margin:0 10px;
padding:8px;
background:#000;
border:1px solid #333;
color:#fff;
border-radius:4px;
}

.tabs-container{
display:flex;
background:#0a0a0a;
border-bottom:1px solid #333;
}

.tabs{
display:flex;
flex:1;
}

.add-tab{
background:none;
border:none;
color:white;
padding:8px;
cursor:pointer;
}

.main{
display:flex;
flex:1;
overflow:hidden;
}

.sidebar{
width:250px;
background:#111;
border-right:1px solid #333;
display:flex;
flex-direction:column;
}

.sidebar.collapsed{
width:40px;
}

.sidebar button{
background:none;
border:none;
color:white;
cursor:pointer;
}

.iframe-container{
flex:1;
background:#000;
}

iframe{
width:100%;
height:100%;
border:none;
}

.list{
flex:1;
padding:10px;
overflow:auto;
}

</style>
</head>

<body>

<!-- LANDING PAGE -->

<div id="landing">

<header>
<h1>Null_X Loader</h1>
<h2>Use responsibly</h2>
</header>

<hr>

<main>
<div class="content-box">

<p>If the link you tried didn't load correctly,</p>
<p>That is your problem ;]</p>

<p style="margin-top:25px;">
No matter what you try, it will likely fail miserably.
</p>

<p>Credit to JimmyQRG for the idea</p>

<button class="launch" onclick="launchBrowser()">
Launch Interface
</button>

</div>
</main>

<footer>
Null_X Loader • Experiments and also bought and paid for by the Null_X organization
</footer>

</div>


<!-- BROWSER UI -->

<div id="browser">

<div class="browser-bar">

<div class="nav-buttons">
<button id="back"><span class="material-icons">arrow_back</span></button>
<button id="forward"><span class="material-icons">arrow_forward</span></button>
<button id="reload"><span class="material-icons">refresh</span></button>
<button id="home"><span class="material-icons">home</span></button>
</div>

<input id="url" placeholder="URL">

<div class="action-buttons">
<button id="go"><span class="material-symbols-outlined">stat_minus_2</span></button>
<button id="open"><span class="material-icons">open_in_new</span></button>
<button id="bookmark"><span class="material-icons">star_border</span></button>
<button id="theme"><span class="material-icons">dark_mode</span></button>
<div class="cloak-wrapper">

<button id="tabCloak" title="Tab Cloak">
<span class="material-icons">visibility</span>
</button>

<div id="cloakMenu" class="cloak-menu">

<button onclick="applyCloak('google')">Google</button>
<button onclick="applyCloak('drive')">Google Drive</button>
<button onclick="applyCloak('classroom')">Google Classroom</button>
<button onclick="applyCloak('blank')">Blank</button>
</div>

</div>

<div class="tabs-container">
<div class="tabs" id="tabs"></div>
<button id="newtab" class="add-tab">
<span class="material-icons">add</span>
</button>
</div>

<div class="main">

<div class="sidebar collapsed" id="sidebar">

<button id="toggleSidebar">
<span class="material-icons">chevron_right</span>
</button>

<div class="list">
<strong>History</strong>
<div id="history"></div>
</div>

<div class="list">
<strong>Bookmarks</strong>
<div id="bookmarks"></div>
</div>

</div>

<div class="iframe-container" id="iframes"></div>

</div>

</div>


<script>
const cloakBtn = document.getElementById("tabCloak");
const cloakMenu = document.getElementById("cloakMenu");

cloakBtn.onclick = function(e){
e.stopPropagation();
cloakMenu.style.display =
cloakMenu.style.display === "block" ? "none" : "block";
};

document.addEventListener("click", function(e){
  if (!cloakMenu.contains(e.target) && e.target !== cloakBtn){
    cloakMenu.style.display = "none";
  }
});
function launchBrowser(){
document.getElementById("landing").style.display="none";
document.getElementById("browser").style.display="flex";
}

/* basic go function */

document.getElementById("go").onclick=function(){

let url=document.getElementById("url").value;

if(!url.startsWith("http")){
url="https://"+url;
}

document.getElementById("iframes").innerHTML=
`<iframe src="${url}"></iframe>`;

};

</script>
  <script src="index.js"></script>
</body>
</html>
