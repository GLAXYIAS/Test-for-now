<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proxy</title>
  <style>
    body { margin:0; background:#000; color:#0f0; font-family:monospace; padding:20px; text-align:center; }
    input, button { padding:10px; font-size:16px; margin:10px; }
    #frame { width:100%; height:80vh; border:none; background:#111; display:none; }
    #error { color:#f00; font-size:2em; }
    #junk { text-align:left; max-width:800px; margin:20px auto; opacity:0.6; white-space:pre-wrap; font-size:0.9em; }
  </style>
</head>
<body>
  <div id="main">
    <h1>Proxy</h1>
    <input id="url" placeholder="https://example.com" style="width:70%;">
    <button onclick="go()">Go</button>
    <button onclick="deploy()" style="background:#0f0;color:#000;">Deploy Link</button>
    <iframe id="frame"></iframe>
  </div>

  <div id="errorPage" style="display:none;">
    <h1 id="error">Error</h1>
    <p>Something went wrong.</p>
    <pre id="junk"></pre>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const target = params.get('url') || params.get('URL');

    if (target) {
      let url = target.trim();
      if (!url.startsWith('http')) url = 'https://' + url;
      document.getElementById('frame').src = url;
      document.getElementById('frame').style.display = 'block';
      document.getElementById('main').style.display = 'block';
    } else {
      // Base URL: show error + junk
      document.getElementById('main').style.display = 'none';
      document.getElementById('errorPage').style.display = 'block';

      // Generate huge wall of meaningless JS junk
      const junkLines = [];
      for (let i = 0; i < 800; i++) {
        const rand = Math.random().toString(36).slice(2);
        junkLines.push(`var _0x${rand.slice(0,8)} = 0x${Math.floor(Math.random()*0xFFFFFFFF).toString(16)}; // junk line ${i}`);
        if (i % 5 === 0) junkLines.push(`function junk${i}(){ return ${Math.random()}; } // filler`);
      }
      document.getElementById('junk').textContent = junkLines.join('\n');
    }

    function go() {
      let u = document.getElementById('url').value.trim();
      if (!u) return;
      if (!u.startsWith('http')) u = 'https://' + u;
      location.href = '?url=' + encodeURIComponent(u);
    }

    function deploy() {
      if (location.search.includes('url=')) {
        navigator.clipboard.writeText(location.href);
        alert('Direct link copied! Open it anywhere.');
      } else {
        alert('Load a site first!');
      }
    }
  </script>
</body>
</html>
